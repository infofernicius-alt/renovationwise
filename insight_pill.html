<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:            #07090F;
    --surface:       rgba(255,255,255,0.03);
    --border:        rgba(255,255,255,0.07);
    --text-primary:  #F2F2F7;
    --text-secondary:rgba(242,242,247,0.5);
    --gold:          #C9953A;
    --gold-soft:     rgba(201,149,58,0.10);
    --gold-border:   rgba(201,149,58,0.20);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    background: var(--bg);
    font-family: 'Sora', sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .insight-pill {
    width: min(520px, 100%);
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--gold-soft);
    border: 1px solid var(--gold-border);
    border-radius: 14px;
    padding: 14px 18px;
    opacity: 0;
    animation: fadeIn 0.6s ease 0.2s forwards;
  }

  .pill-icon {
    font-size: 15px;
    flex-shrink: 0;
    margin-top: 1px;
    opacity: 0.85;
  }

  .pill-content {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .pill-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .pill-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 300;
    font-style: italic;
    color: var(--text-primary);
    line-height: 1.5;
    letter-spacing: 0.01em;
  }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>
<body>

<div class="insight-pill">
  <span class="pill-icon">💡</span>
  <div class="pill-content">
    <span class="pill-label">Industry Insight</span>
    <span class="pill-text">Most kitchen quotes exclude at least three cost categories. Comparing them directly can be misleading.</span>
  </div>
</div>

</body>
</html>
